# Compile all modules, then run test-watch:test (only in module-a where plugin is configured)
# Pass -DtestWatch.ciMaxRunSeconds=3 so the watch loop exits after 3 seconds (CI mode)
# Note: module-b does NOT have the plugin configured so test-watch:test is skipped there
invoker.goals = compile test-compile com.example:test-watch-maven-plugin:test -DtestWatch.ciMaxRunSeconds=3
